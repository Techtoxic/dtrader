[build]
  command = "npm run build:all"
  publish = "packages/core/dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    # Allow embedding in iframes from any origin (needed for dbot integration)
    # Use CSP frame-ancestors instead of deprecated X-Frame-Options
    Content-Security-Policy = "frame-ancestors *"
